language: en-US

tone_instructions: >
  Be concise and pragmatic. This module ingests data from external sources — flag rate-limiting, retry, and credential-handling gaps.

early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "`@coderabbitai` summary"
  high_level_summary_in_walkthrough: true
  auto_title_placeholder: "`@coderabbitai` title"
  sequence_diagrams: true
  collapse_walkthrough: false
  changed_files_summary: true
  poem: false
  suggested_labels: true
  suggested_reviewers: false
  related_issues: true
  related_prs: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.md"
    - "!**/target/**"
  path_instructions:
    - path: "**/*"
      instructions: >
        Flag correctness, concurrency, resource-leak,
        security, and performance issues aggressively. When a change appears to
        alter an existing architectural pattern or introduce new shared/stateful
        infrastructure, call that out explicitly as an "architecture" concern
        rather than a routine style comment.
        In addition to routine correctness review, explicitly call out:
        (1) Security-relevant concerns — injection risks (e.g. building
        glob/regex/SQL/shell patterns from variable input), credential or
        secret handling, unsafe deserialization, missing input validation,
        or SSRF/timeout gaps in network/process-execution code.
        (2) Performance/concurrency concerns — thread-safety of shared
        mutable state, blocking calls inside virtual threads, unbounded
        resource usage, and missing cancellation/cleanup on
        timeout/failure paths.
        (3) Architectural concerns — new stateful/shared infrastructure,
        changes to existing module contracts, or new coupling between
        packages that weren't previously related. When such a change is
        found, describe the concern and suggest what should be verified
        or documented.
        Module-specific additions for this repository:
        This module ingests data from external sources (crawlers, log tails, API polls). In addition to the standard checks, watch for: (1) missing rate limiting or retry-with-backoff on outbound calls — will hammer sources and get us blocked; (2) robots.txt / crawl-delay awareness for HTTP-fetch code paths; (3) credential handling — API keys, cookies, and bearer tokens in code, logs, or exception messages; (4) timeout gaps — network reads without a bounded deadline; (5) unbounded parallelism when fanning out to many source endpoints; (6) input validation on data pulled from untrusted sources (size limits, content-type checks, malformed-input tolerance); (7) idempotency of ingest steps — reruns after a crash should not double-write.
  abort_on_close: true
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
